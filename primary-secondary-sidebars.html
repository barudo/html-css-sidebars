<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Primary and Secondary Sidebars</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">
  <style>
    :root {
      --orange: #f3500a;
      --light-orange: #fc7b44;
      --page: #eef8fd;
      --secondary: #b8b8b8;
      --secondary-dark: #858585;
      --sidebar-min: 88px;
      --sidebar-max: 250px;
      --mobile-bar: 88px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      margin: 0;
      overflow-x: hidden;
      background: var(--page);
      font-family: Arial, Helvetica, sans-serif;
    }

    .layout {
      min-height: 100vh;
      display: flex;
    }

    .primary-sidebar {
      position: fixed;
      inset: 0 auto 0 0;
      z-index: 30;
      width: var(--sidebar-min);
      padding: 14px;
      display: flex;
      flex-direction: column;
      background: var(--orange);
      transition: width 220ms ease;
    }

    .primary-sidebar.is-expanded {
      width: var(--sidebar-max);
    }

    .brand-mark {
      width: 48px;
      height: 48px;
      margin: 8px auto 64px;
      display: grid;
      place-items: center;
      border-radius: 8px;
      color: #fff;
      background:
        radial-gradient(circle at 32% 22%, #fff 0 3px, transparent 4px),
        radial-gradient(circle at 49% 16%, #fff 0 3px, transparent 4px),
        radial-gradient(circle at 66% 22%, #fff 0 3px, transparent 4px),
        #39a346;
      font-size: 24px;
      flex: 0 0 auto;
    }

    .primary-sidebar.is-expanded .brand-mark {
      margin-bottom: 74px;
    }

    .search-button,
    .nav-button {
      min-height: 56px;
      margin-top: 5px;
      margin-bottom: 5px;
      border: 0;
      color: #fff;
      background: transparent;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
      font-size: 16px;
      font-weight: 700;
      white-space: nowrap;
      overflow: hidden;
    }

    .search-button {
      color: #888;
      background: #fff;
      font-weight: 400;
      font-size: 20px;
    }

    .primary-sidebar:not(.is-expanded) .search-button {
      color: transparent;
    }

    .nav-button:hover,
    .nav-button:focus-visible,
    .nav-button.is-active {
      color: #fff;
      background: rgba(255, 255, 255, 0.22);
    }

    .nav-button .icon-slot,
    .secondary-link .icon-slot {
      width: 32px;
      min-width: 32px;
      display: grid;
      place-items: center;
      font-size: 28px;
    }

    .nav-button .label,
    .search-button .label {
      display: none;
      min-width: 0;
    }

    .primary-sidebar.is-expanded .nav-button,
    .primary-sidebar.is-expanded .search-button {
      justify-content: flex-start;
      padding-left: 22px;
      padding-right: 22px;
    }

    .primary-sidebar.is-expanded .nav-button .label,
    .primary-sidebar.is-expanded .search-button .label {
      display: inline;
    }

    .sidebar-spacer {
      flex: 1 1 auto;
    }

    .primary-toggle {
      position: absolute;
      top: 37%;
      right: -20px;
      width: 40px;
      height: 40px;
      border: 0;
      border-radius: 50%;
      display: grid;
      place-items: center;
      color: #fff;
      background: var(--light-orange);
      box-shadow: 0 8px 18px rgba(0, 0, 0, 0.14);
    }

    .primary-sidebar.is-expanded .primary-toggle i {
      transform: rotate(180deg);
    }

    .secondary-launcher {
      position: fixed;
      top: 26px;
      left: calc(var(--sidebar-min) + 28px);
      z-index: 25;
      width: 66px;
      height: 66px;
      border: 0;
      border-radius: 6px;
      display: grid;
      place-items: center;
      color: #fff;
      background: var(--secondary-dark);
      font-size: 34px;
      transition: left 220ms ease, opacity 160ms ease;
    }

    .primary-sidebar.is-expanded ~ .secondary-launcher {
      opacity: 0;
      pointer-events: none;
    }

    .secondary-sidebar {
      position: fixed;
      inset: 0 auto 0 var(--sidebar-min);
      z-index: 22;
      width: 0;
      overflow: hidden;
      color: #fff;
      background: var(--secondary);
      transition: width 220ms ease;
    }

    .secondary-sidebar.is-open {
      width: var(--sidebar-max);
    }

    .secondary-header {
      height: 66px;
      padding-left: 14px;
      display: flex;
      align-items: center;
      background: var(--secondary-dark);
    }

    .secondary-toggle {
      width: 52px;
      height: 52px;
      border: 0;
      color: #fff;
      background: transparent;
      font-size: 34px;
    }

    .secondary-menu {
      padding: 26px 22px;
    }

    .secondary-link {
      min-height: 56px;
      margin: 8px 0;
      border: 0;
      color: #fff;
      background: transparent;
      display: flex;
      align-items: center;
      gap: 16px;
      font-size: 18px;
      font-weight: 700;
      white-space: nowrap;
    }

    .secondary-link:hover,
    .secondary-link:focus-visible {
      color: #fff;
      background: rgba(255, 255, 255, 0.15);
    }

    .content {
      min-height: 100vh;
      flex: 1;
      margin-left: var(--sidebar-min);
      padding: 48px 48px 48px 120px;
      transition: margin-left 220ms ease;
      background: #fff;
    }

    .primary-sidebar.is-expanded ~ .content {
      margin-left: var(--sidebar-max);
      padding-left: 48px;
    }

    .secondary-sidebar.is-open ~ .content {
      margin-left: calc(var(--sidebar-min) + var(--sidebar-max));
      padding-left: 48px;
    }

    .content-panel {
      max-width: 900px;
    }

    .content h1 {
      margin: 0 0 12px;
      font-size: 32px;
      font-weight: 700;
    }

    .content p {
      max-width: 680px;
      color: #606975;
    }

    .mobile-topbar {
      display: none;
    }

    @media (max-width: 767.98px) {
      body {
        padding-top: var(--mobile-bar);
        padding-bottom: var(--mobile-bar);
      }

      .layout {
        display: block;
      }

      .mobile-topbar {
        position: fixed;
        inset: 0 0 auto 0;
        z-index: 40;
        height: var(--mobile-bar);
        padding: 0 20px;
        display: grid;
        grid-template-columns: 56px 1fr auto;
        align-items: center;
        gap: 16px;
        color: #fff;
        background: var(--secondary-dark);
      }

      .mobile-topbar .menu-button {
        width: 56px;
        height: 56px;
        border: 0;
        color: #fff;
        background: transparent;
        font-size: 32px;
      }

      .mobile-topbar .brand-mark {
        display: grid;
        width: 48px;
        height: 48px;
        margin: 0;
      }

      .mobile-topbar .company-name {
        margin: 0;
        font-size: clamp(22px, 7vw, 34px);
        font-weight: 800;
        line-height: 1;
        white-space: nowrap;
      }

      .primary-sidebar,
      .primary-sidebar.is-expanded {
        inset: auto 0 0 0;
        width: 100%;
        height: var(--mobile-bar);
        padding: 10px 16px;
        flex-direction: row;
        align-items: center;
        justify-content: center;
        transition: none;
      }

      .primary-sidebar > .brand-mark,
      .search-button,
      .sidebar-spacer,
      .primary-toggle,
      .utility-button,
      .secondary-launcher,
      .secondary-sidebar {
        display: none;
      }

      .primary-nav {
        width: 100%;
        display: grid;
        grid-template-columns: repeat(5, minmax(0, 1fr));
        gap: 0;
      }

      .nav-button {
        width: auto;
        min-height: 68px;
        margin: 0 5px;
        padding: 0;
        justify-content: center;
      }

      .nav-button .label {
        display: none !important;
      }

      .nav-button .icon-slot {
        font-size: 30px;
      }

      .mobile-hidden {
        display: none;
      }

      .content,
      .primary-sidebar.is-expanded ~ .content,
      .secondary-sidebar.is-open ~ .content {
        min-height: calc(100vh - (var(--mobile-bar) * 2));
        margin-left: 0;
        padding: 28px 20px;
      }

      .offcanvas.secondary-mobile {
        color: #fff;
        background: var(--secondary);
      }

      .offcanvas.secondary-mobile .offcanvas-header {
        height: var(--mobile-bar);
        background: var(--secondary-dark);
      }

      .offcanvas.secondary-mobile .btn-close {
        filter: invert(1) grayscale(1) brightness(2);
      }
    }
  </style>
</head>
<body>
  <header class="mobile-topbar" aria-label="Secondary mobile bar">
    <button class="menu-button" type="button" data-bs-toggle="offcanvas" data-bs-target="#secondaryMobile" aria-controls="secondaryMobile" aria-label="Open secondary menu">
      <i class="fa-solid fa-bars" aria-hidden="true"></i>
    </button>
    <div class="brand-mark" aria-hidden="true">
      <i class="fa-solid fa-hands-holding-heart"></i>
    </div>
    <p class="company-name">Company Name</p>
  </header>

  <main class="layout">
    <aside class="primary-sidebar" id="primarySidebar" aria-label="Primary navigation">
      <div class="brand-mark" aria-hidden="true">
        <i class="fa-solid fa-hands-holding-heart"></i>
      </div>

      <button class="btn search-button" type="button">
        <i class="fa-solid fa-magnifying-glass icon-slot" aria-hidden="true"></i>
        <span class="label">Search...</span>
      </button>

      <nav class="primary-nav" aria-label="Main">
        <button class="btn nav-button is-active" type="button" aria-label="Home">
          <i class="fa-solid fa-house icon-slot" aria-hidden="true"></i>
          <span class="label">Home</span>
        </button>
        <button class="btn nav-button" type="button" aria-label="Roster">
          <i class="fa-solid fa-stopwatch icon-slot" aria-hidden="true"></i>
          <span class="label">Roster</span>
        </button>
        <button class="btn nav-button" type="button" aria-label="Calendar">
          <i class="fa-solid fa-calendar-days icon-slot" aria-hidden="true"></i>
          <span class="label">Calendar</span>
        </button>
        <button class="btn nav-button" type="button" aria-label="Forms">
          <i class="fa-solid fa-file-lines icon-slot" aria-hidden="true"></i>
          <span class="label">Forms</span>
        </button>
        <button class="btn nav-button" type="button" aria-label="Tasks">
          <i class="fa-solid fa-square-check icon-slot" aria-hidden="true"></i>
          <span class="label">Tasks</span>
        </button>
        <button class="btn nav-button mobile-hidden" type="button" aria-label="Billing">
          <i class="fa-solid fa-file-invoice-dollar icon-slot" aria-hidden="true"></i>
          <span class="label">Billing</span>
        </button>
      </nav>

      <div class="sidebar-spacer"></div>

      <button class="btn nav-button utility-button" type="button" aria-label="Settings">
        <i class="fa-solid fa-gear icon-slot" aria-hidden="true"></i>
        <span class="label">Settings</span>
      </button>
      <button class="btn nav-button utility-button" type="button" aria-label="Log out">
        <i class="fa-solid fa-right-from-bracket icon-slot" aria-hidden="true"></i>
        <span class="label">Log Out</span>
      </button>

      <button class="primary-toggle" id="primaryToggle" type="button" aria-label="Expand primary sidebar" aria-expanded="false">
        <i class="fa-solid fa-chevron-right" aria-hidden="true"></i>
      </button>
    </aside>

    <button class="secondary-launcher" id="secondaryLauncher" type="button" aria-label="Open secondary sidebar" aria-expanded="false">
      <i class="fa-solid fa-bars" aria-hidden="true"></i>
    </button>

    <aside class="secondary-sidebar" id="secondarySidebar" aria-label="Secondary navigation">
      <div class="secondary-header">
        <button class="secondary-toggle" id="secondaryToggle" type="button" aria-label="Close secondary sidebar" aria-expanded="true">
          <i class="fa-solid fa-bars" aria-hidden="true"></i>
        </button>
      </div>
      <nav class="secondary-menu" aria-label="Secondary">
        <button class="btn secondary-link" type="button">
          <i class="fa-solid fa-house icon-slot" aria-hidden="true"></i>
          <span>Name</span>
        </button>
        <button class="btn secondary-link" type="button">
          <i class="fa-solid fa-stopwatch icon-slot" aria-hidden="true"></i>
          <span>Name</span>
        </button>
        <button class="btn secondary-link" type="button">
          <i class="fa-solid fa-calendar-days icon-slot" aria-hidden="true"></i>
          <span>Name</span>
        </button>
        <button class="btn secondary-link" type="button">
          <i class="fa-solid fa-file-lines icon-slot" aria-hidden="true"></i>
          <span>Name</span>
        </button>
        <button class="btn secondary-link" type="button">
          <i class="fa-solid fa-square-check icon-slot" aria-hidden="true"></i>
          <span>Name</span>
        </button>
        <button class="btn secondary-link" type="button">
          <i class="fa-solid fa-file-invoice-dollar icon-slot" aria-hidden="true"></i>
          <span>Name</span>
        </button>
      </nav>
    </aside>

    <section class="content" aria-label="Content">
      <div class="content-panel">
        <h1>Content Area</h1>
        <p>This page demonstrates the primary and secondary sidebars. On desktop, opening one sidebar closes the other. On mobile, the primary navigation becomes a bottom bar and the secondary navigation moves into a Bootstrap offcanvas from the top bar.</p>
      </div>
    </section>
  </main>

  <div class="offcanvas offcanvas-start secondary-mobile" tabindex="-1" id="secondaryMobile" aria-labelledby="secondaryMobileLabel">
    <div class="offcanvas-header">
      <h2 class="offcanvas-title h4" id="secondaryMobileLabel">Company Name</h2>
      <button type="button" class="btn-close" data-bs-dismiss="offcanvas" aria-label="Close"></button>
    </div>
    <div class="offcanvas-body p-4">
      <nav aria-label="Secondary mobile">
        <button class="btn secondary-link" type="button">
          <i class="fa-solid fa-house icon-slot" aria-hidden="true"></i>
          <span>Name</span>
        </button>
        <button class="btn secondary-link" type="button">
          <i class="fa-solid fa-stopwatch icon-slot" aria-hidden="true"></i>
          <span>Name</span>
        </button>
        <button class="btn secondary-link" type="button">
          <i class="fa-solid fa-calendar-days icon-slot" aria-hidden="true"></i>
          <span>Name</span>
        </button>
        <button class="btn secondary-link" type="button">
          <i class="fa-solid fa-file-lines icon-slot" aria-hidden="true"></i>
          <span>Name</span>
        </button>
        <button class="btn secondary-link" type="button">
          <i class="fa-solid fa-square-check icon-slot" aria-hidden="true"></i>
          <span>Name</span>
        </button>
        <button class="btn secondary-link" type="button">
          <i class="fa-solid fa-file-invoice-dollar icon-slot" aria-hidden="true"></i>
          <span>Name</span>
        </button>
      </nav>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    const primarySidebar = document.getElementById('primarySidebar');
    const primaryToggle = document.getElementById('primaryToggle');
    const secondarySidebar = document.getElementById('secondarySidebar');
    const secondaryLauncher = document.getElementById('secondaryLauncher');
    const secondaryToggle = document.getElementById('secondaryToggle');

    function setPrimary(open) {
      primarySidebar.classList.toggle('is-expanded', open);
      primaryToggle.setAttribute('aria-expanded', String(open));
      primaryToggle.setAttribute('aria-label', open ? 'Minimize primary sidebar' : 'Expand primary sidebar');

      if (open) {
        setSecondary(false);
      }
    }

    function setSecondary(open) {
      secondarySidebar.classList.toggle('is-open', open);
      secondaryLauncher.setAttribute('aria-expanded', String(open));
      secondaryToggle.setAttribute('aria-expanded', String(open));
      secondaryToggle.setAttribute('aria-label', open ? 'Close secondary sidebar' : 'Open secondary sidebar');

      if (open) {
        primarySidebar.classList.remove('is-expanded');
        primaryToggle.setAttribute('aria-expanded', 'false');
        primaryToggle.setAttribute('aria-label', 'Expand primary sidebar');
      }
    }

    primaryToggle.addEventListener('click', () => {
      setPrimary(!primarySidebar.classList.contains('is-expanded'));
    });

    secondaryLauncher.addEventListener('click', () => {
      setSecondary(true);
    });

    secondaryToggle.addEventListener('click', () => {
      setSecondary(false);
    });
  </script>
</body>
</html>
